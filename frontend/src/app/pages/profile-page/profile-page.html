<div class="profile-card">

    <div class="profile-title">
        <h3>{{user.login}} Profile</h3>
    </div>

    <div>
        <img src="" alt="Profile picture" class="profile-picture">
    </div>

    <div class="profile-info">

        @if(editMode){
        <input type="text" value="{{user.login}}" class="edit-login-input">
        } @else {
        <p>login: {{user.login}}</p>
        }

        <p>email: {{user.email}}</p>
    </div>

    @if(user !== null){
        <change-password [currentUser]="user"></change-password>
    }

    <div class="delete-account">
        <button class="delete-account-button">Delete account</button>
    </div>

</div>
