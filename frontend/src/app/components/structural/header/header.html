<header class="header-wrapper">

    <div class="logo-wrapper" routerLink="/">
        <img src="logo.svg" alt="logo" class="logo-symbol" draggable="false" />
        <span class="app-name">
            {{appName}}
        </span>
    </div>

    <ul class="user-menu">
        @if(isSignedIn){

            @if(userId){
                <li><img class="avatar-thumbnail" routerLink="/profile" src="/v1/user/{{userId}}/avatar" /></li>
            } @else {
                <li routerLink="/profile" routerLinkActive="active-route">profile</li>
            }

        <li (click)="signOut()" class="sign-out">sign out</li>
        } @else {
        <li routerLinkActive="active" routerLink="/sign-in">sign in</li>
        }
    </ul>

</header>
