x-redis-base: &redis-base
    image: redis:7-alpine
    container_name: short-links-manager-redis
    restart: always
    tty: true
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
        - short-links-manager-network
    volumes:
        - redis-data:/data

services:
    short-links-manager-redis-dev:
        <<: *redis-base
        profiles: [dev, redis-dev]
        ports:
            - "127.0.0.1:6379:6379"

    short-links-manager-redis-prod:
        <<: *redis-base
        profiles: [prod, redis-prod]
